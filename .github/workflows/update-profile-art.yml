# Regenerates contrib-heatmap.svg daily so it always reflects real,
# current contribution data. Place at: .github/workflows/update-profile-art.yml
# in your piyusshhjangid/piyusshhjangid repo.
#
# info-card.svg and ascii-portrait.svg are NOT touched by this workflow —
# that data (stack, focus, goals, portrait) changes rarely, so just re-run
# the relevant script by hand (see scripts/README notes) whenever you want
# to update them.

name: Update Profile Art

on:
  schedule:
    - cron: "0 3 * * *"   # once daily, 3am UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate contribution heatmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/make_heatmap_svg.py piyusshhjangid contrib-heatmap.svg

      - name: Commit changes if anything moved
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contrib-heatmap.svg
          git diff --staged --quiet || git commit -m "chore: refresh contribution heatmap"
          git push
